<script type="module">
  if (document.querySelector("pre.mermaid")) {
    const { default: mermaid } = await import(
      "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs"
    );
    // Tokyo Night palette, matching assets/css/extended/syntax-tokyonight.css
    mermaid.initialize({
      startOnLoad: false,
      theme: "base",
      themeVariables: {
        darkMode: true,
        background: "#1a1b26",
        mainBkg: "#24283b",
        primaryColor: "#24283b",
        primaryTextColor: "#c0caf5",
        primaryBorderColor: "#7aa2f7",
        secondaryColor: "#414868",
        secondaryTextColor: "#c0caf5",
        secondaryBorderColor: "#565f89",
        tertiaryColor: "#1f2335",
        tertiaryTextColor: "#c0caf5",
        tertiaryBorderColor: "#565f89",
        lineColor: "#7dcfff",
        textColor: "#c0caf5",
        nodeTextColor: "#c0caf5",
        edgeLabelBackground: "#1a1b26",
        clusterBkg: "#1f2335",
        clusterBorder: "#565f89",
        titleColor: "#c0caf5"
      }
    });
    await mermaid.run();
  }
</script>
